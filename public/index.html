<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Scraper</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2637619605696540"
     crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c12;
      --surface:  #13131f;
      --surface2: #1c1c2e;
      --border:   #2a2a40;
      --accent:   #7c6eff;
      --accent2:  #a78bfa;
      --danger:   #f87171;
      --success:  #34d399;
      --text:     #e8e8f0;
      --muted:    #7878a0;
      --radius:   12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    header {
      padding: 36px 32px 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0f0f1e 0%, var(--bg) 100%);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 10px;
      max-width: 900px;
    }

    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .btn {
      padding: 12px 22px;
      border-radius: var(--radius);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }

    .btn-success {
      background: linear-gradient(135deg, #059669, var(--success));
      color: #fff;
    }
    .btn-success:hover:not(:disabled) { opacity: 0.88; }

    /* ── Main content ── */
    main { padding: 28px 32px; }

    /* ── Status bar ── */
    #status {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 14px;
    }

    #status.visible { display: flex; }
    #status.error { border-color: var(--danger); color: var(--danger); }
    #status.success { border-color: var(--success); color: var(--success); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toolbar ── */
    #toolbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    #toolbar.visible { display: flex; }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .count-badge {
      font-size: 14px;
      color: var(--muted);
    }

    .count-badge strong {
      color: var(--text);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Image grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .img-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      aspect-ratio: 1;
    }

    .img-card:hover { transform: scale(1.02); }
    .img-card.selected { border-color: var(--accent); }

    .img-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder when image can't load */
    .img-card .placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      text-align: center;
    }

    .placeholder-icon { font-size: 28px; opacity: 0.4; }
    .placeholder-text {
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.4;
      max-height: 60px;
      overflow: hidden;
    }

    /* Selection checkmark overlay */
    .img-card .check {
      position: absolute;
      top: 7px; right: 7px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
      place-items: center;
      font-size: 13px;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .img-card.selected .check { display: grid; }

    /* ── Download progress overlay ── */
    #download-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      place-items: center;
    }

    #download-overlay.visible { display: grid; }

    .download-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 44px;
      text-align: center;
      min-width: 320px;
    }

    .download-card h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .download-card p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s ease;
      animation: shimmer 1.5s infinite;
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .progress-label {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Empty state ── */
    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 80px 20px;
      color: var(--muted);
      text-align: center;
    }

    #empty.visible { display: flex; }
    #empty .empty-icon { font-size: 48px; opacity: 0.3; }
    #empty p { font-size: 15px; }
    #empty small { font-size: 13px; opacity: 0.7; }

    /* ── Mobile responsive ── */
    @media (max-width: 600px) {
      header {
        padding: 20px 16px 16px;
      }

      .logo {
        margin-bottom: 16px;
      }

      .logo h1 { font-size: 17px; }
      .logo p  { font-size: 12px; }

      .input-row {
        flex-direction: column;
        gap: 8px;
      }

      .url-input {
        font-size: 16px; /* prevents iOS zoom on focus */
        width: 100%;
      }

      #scan-btn {
        width: 100%;
        padding: 13px;
        font-size: 15px;
      }

      main { padding: 16px; }

      #toolbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .toolbar-left {
        flex-wrap: wrap;
        gap: 8px;
      }

      #download-btn {
        width: 100%;
        padding: 13px;
        font-size: 15px;
        text-align: center;
      }

      #grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 8px;
      }

      .download-card {
        min-width: unset;
        width: calc(100vw - 40px);
        padding: 28px 24px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🖼</div>
    <div>
      <h1>Image Scraper</h1>
      <p>Download all images from any URL at the highest resolution</p>
    </div>
  </div>

  <div class="input-row">
    <input
      id="url-input"
      class="url-input"
      type="url"
      placeholder="https://example.com/gallery"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="scan-btn" class="btn btn-primary" onclick="scan()">
      Scan for Images
    </button>
  </div>
</header>

<main>
  <!-- Status bar -->
  <div id="status">
    <div class="spinner" id="spinner"></div>
    <span id="status-text"></span>
  </div>

  <!-- Toolbar (shown after scan) -->
  <div id="toolbar">
    <div class="toolbar-left">
      <span class="count-badge">
        <strong id="selected-count">0</strong> of
        <strong id="total-count">0</strong> selected
      </span>
      <button class="btn btn-secondary" style="padding:8px 14px;font-size:13px" onclick="selectAll()">Select All</button>
      <button class="btn btn-secondary" style="padding:8px 14px;font-size:13px" onclick="deselectAll()">Deselect All</button>
    </div>
    <div class="toolbar-right">
      <button id="download-btn" class="btn btn-success" onclick="download()">
        ⬇ Download Selected
      </button>
    </div>
  </div>

  <!-- Image grid -->
  <div id="grid"></div>

  <!-- Empty state -->
  <div id="empty">
    <div class="empty-icon">🔍</div>
    <p>No images found on this page</p>
    <small>Try a different URL — some pages load images dynamically via JavaScript</small>
  </div>
</main>

<!-- Download overlay -->
<div id="download-overlay">
  <div class="download-card">
    <h2>Preparing your download</h2>
    <p id="dl-label">Downloading images and building zip...</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="dl-progress-label">Please wait</div>
  </div>
</div>

<script>
  let allImages = [];
  let selected = new Set();

  // ── Scan ──────────────────────────────────────────────────────────────────

  async function scan() {
    const rawUrl = document.getElementById('url-input').value.trim();
    if (!rawUrl) return;

    // Reset UI
    setStatus('scanning', 'Fetching page and scanning for images…');
    document.getElementById('toolbar').classList.remove('visible');
    document.getElementById('empty').classList.remove('visible');
    document.getElementById('grid').innerHTML = '';
    document.getElementById('scan-btn').disabled = true;
    allImages = [];
    selected.clear();

    try {
      const res = await fetch('/api/scrape', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: rawUrl }),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Failed to fetch page');

      if (!data.images || data.images.length === 0) {
        setStatus('', '');
        document.getElementById('status').classList.remove('visible');
        document.getElementById('empty').classList.add('visible');
        return;
      }

      allImages = data.images;
      selected = new Set(allImages); // select all by default
      renderGrid();
      updateToolbar();
      setStatus('success', `Found ${allImages.length} image${allImages.length !== 1 ? 's' : ''}`);
      document.getElementById('toolbar').classList.add('visible');

    } catch (err) {
      setStatus('error', err.message);
    } finally {
      document.getElementById('scan-btn').disabled = false;
    }
  }

  // ── Grid ──────────────────────────────────────────────────────────────────

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    allImages.forEach((url, i) => {
      const card = document.createElement('div');
      card.className = 'img-card selected';
      card.dataset.url = url;
      card.onclick = () => toggleCard(card, url);

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = url;
      img.alt = '';
      img.onerror = () => {
        img.style.display = 'none';
        const ph = document.createElement('div');
        ph.className = 'placeholder';
        ph.innerHTML = `
          <div class="placeholder-icon">🖼</div>
          <div class="placeholder-text">${shortUrl(url)}</div>
        `;
        card.insertBefore(ph, card.querySelector('.check'));
      };

      const check = document.createElement('div');
      check.className = 'check';
      check.textContent = '✓';

      card.appendChild(img);
      card.appendChild(check);
      grid.appendChild(card);
    });
  }

  function toggleCard(card, url) {
    if (selected.has(url)) {
      selected.delete(url);
      card.classList.remove('selected');
    } else {
      selected.add(url);
      card.classList.add('selected');
    }
    updateToolbar();
  }

  function selectAll() {
    selected = new Set(allImages);
    document.querySelectorAll('.img-card').forEach(c => c.classList.add('selected'));
    updateToolbar();
  }

  function deselectAll() {
    selected.clear();
    document.querySelectorAll('.img-card').forEach(c => c.classList.remove('selected'));
    updateToolbar();
  }

  function updateToolbar() {
    document.getElementById('selected-count').textContent = selected.size;
    document.getElementById('total-count').textContent = allImages.length;
    document.getElementById('download-btn').disabled = selected.size === 0;
    document.getElementById('download-btn').textContent =
      `⬇ Download Selected (${selected.size})`;
  }

  // ── Download ──────────────────────────────────────────────────────────────

  async function download() {
    if (selected.size === 0) return;

    const overlay = document.getElementById('download-overlay');
    const fill = document.getElementById('progress-fill');
    const dlLabel = document.getElementById('dl-progress-label');

    overlay.classList.add('visible');
    fill.style.width = '0%';
    dlLabel.textContent = `Preparing ${selected.size} image${selected.size !== 1 ? 's' : ''}…`;

    // Animate the bar while waiting (indeterminate)
    let fake = 0;
    const fakeTimer = setInterval(() => {
      fake = Math.min(fake + Math.random() * 8, 85);
      fill.style.width = fake + '%';
    }, 400);

    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: [...selected] }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Download failed' }));
        throw new Error(err.error || 'Download failed');
      }

      clearInterval(fakeTimer);
      fill.style.width = '100%';
      dlLabel.textContent = 'Zip ready — saving…';

      // Trigger browser download
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = 'images.zip';
      a.click();
      URL.revokeObjectURL(blobUrl);

      setTimeout(() => overlay.classList.remove('visible'), 800);

    } catch (err) {
      clearInterval(fakeTimer);
      overlay.classList.remove('visible');
      setStatus('error', err.message);
    }
  }

  // ── Utils ──────────────────────────────────────────────────────────────────

  function setStatus(type, text) {
    const el = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    el.className = 'visible';
    if (type === 'error')   el.classList.add('error');
    if (type === 'success') el.classList.add('success');
    spinner.style.display = type === 'scanning' ? 'block' : 'none';
    document.getElementById('status-text').textContent = text;
    if (!text) el.classList.remove('visible');
  }

  function shortUrl(url) {
    try {
      const u = new URL(url);
      const name = u.pathname.split('/').pop() || u.hostname;
      return name.length > 40 ? name.slice(0, 40) + '…' : name;
    } catch {
      return url.slice(0, 40);
    }
  }

  // Allow pressing Enter in the input
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') scan();
  });
</script>

</body>
</html>
